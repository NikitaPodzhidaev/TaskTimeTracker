services:
  postgres:
    image: postgres:16-alpine
    container_name: task-time-tracker-postgres
    environment:
      POSTGRES_DB: task_time_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
